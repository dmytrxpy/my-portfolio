<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Under Construction</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            text-align: center;
        }
        .container {
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 4rem 2rem;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            max-width: 500px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            letter-spacing: -0.5px;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            opacity: 0.7;
            margin-bottom: 2rem;
        }
        .timer-label {
            display: inline-block;
            padding: 8px 16px;
            background: rgba(233, 69, 96, 0.15);
            border: 1px solid #e94560;
            border-radius: 8px;
            color: #e94560;
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="timer-label">Coming Soon</div>
        <h1>Portfolio in progress</h1>
        <p>The website is currently under development and will be published in a few days. Stay tuned!</p>
    </div>
</body>
</html>
